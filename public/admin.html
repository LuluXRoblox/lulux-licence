<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuluXStarDev — Admin Panel</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  :root{
    --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2e2e4a;
    --purple:#8a2be2;--purple2:#9d4dff;--purple3:#5a1a9a;
    --green:#00ff88;--red:#ff4455;--yellow:#ffc107;--blue:#5865f2;
    --text:#e0e0f0;--muted:#7070a0;
  }
  body{background:var(--bg);color:var(--text);min-height:100vh}

  /* ── LOGIN ── */
  #login-screen{
    position:fixed;inset:0;display:flex;align-items:center;
    justify-content:center;background:var(--bg);z-index:100;
  }
  .login-box{
    width:300px;background:var(--card);border:2px solid var(--purple);
    border-radius:14px;padding:28px 24px;text-align:center;
    box-shadow:0 0 30px rgba(138,43,226,.3);
  }
  .login-box h1{font-size:24px;margin-bottom:4px;color:#fff}
  .login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
  .login-box input{
    width:85%;padding:10px 12px;background:#0f0f18;border:1.5px solid var(--border);
    border-radius:8px;color:#fff;font-size:14px;outline:none;margin-bottom:12px;
    transition:.2s;display:block;margin-left:auto;margin-right:auto
  }
  .login-box input:focus{border-color:var(--purple)}
  .login-error{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}

  /* ── LAYOUT ── */
  #app{display:none;flex-direction:column;min-height:100vh}
  header{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 28px;height:56px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:10;
  }
  .logo{font-size:18px;font-weight:700;color:#fff}
  .logo span{color:var(--purple)}
  .header-right{display:flex;align-items:center;gap:12px}
  .badge{
    padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;
    background:var(--purple3);color:var(--purple2)
  }
  main{padding:28px;flex:1}

  /* ── STATS ROW ── */
  .stats-bar{
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:10px 20px;margin-bottom:20px;font-size:14px;color:var(--muted);
    display:flex;align-items:center;gap:12px;flex-wrap:wrap
  }
  .stats-bar span{font-weight:700;color:var(--text)}
  .sep{color:var(--border)}

  /* ── TOOLBAR ── */
  .toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap input{
    width:100%;padding:10px 14px 10px 38px;background:var(--card);
    border:1px solid var(--border);border-radius:10px;color:#fff;
    font-size:14px;outline:none;transition:.2s
  }
  .search-wrap input:focus{border-color:var(--purple)}
  .search-wrap::before{
    content:"";position:absolute;left:12px;top:50%;transform:translateY(-50%);
    font-size:14px;opacity:.5
  }

  /* ── BUTTONS ── */
  .btn{
    padding:10px 18px;border:none;border-radius:10px;font-size:14px;
    font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;
    align-items:center;gap:6px
  }
  .btn-purple{background:var(--purple);color:#fff}
  .btn-purple:hover{background:var(--purple2)}
  .btn-red{background:rgba(255,68,85,.15);color:var(--red);border:1px solid rgba(255,68,85,.3)}
  .btn-red:hover{background:rgba(255,68,85,.25)}
  .btn-green{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.25)}
  .btn-green:hover{background:rgba(0,255,136,.22)}
  .btn-blue{background:rgba(88,101,242,.15);color:var(--blue);border:1px solid rgba(88,101,242,.3)}
  .btn-blue:hover{background:rgba(88,101,242,.25)}
  .btn-sm{padding:6px 12px;font-size:12px}

  /* ── TABLE ── */
  .table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:14px}
  table{width:100%;border-collapse:collapse;min-width:700px}
  thead tr{border-bottom:1px solid var(--border)}
  th{
    padding:12px 16px;text-align:left;font-size:12px;
    font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px
  }
  tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:.15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(138,43,226,.06)}
  td{padding:12px 16px;font-size:14px;vertical-align:middle}
  .key-val{
    font-family:monospace;font-size:13px;background:#0f0f18;
    padding:3px 8px;border-radius:6px;color:var(--purple2)
  }
  .status-badge{
    padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px
  }
  .s-developer{background:rgba(255,193,7,.12);color:var(--yellow)}
  .s-timDeveloper{background:rgba(88,101,242,.15);color:var(--blue)}
  .s-user{background:rgba(138,43,226,.15);color:var(--purple2)}
  .expire-ok{color:var(--green);font-size:13px}
  .expire-warn{color:var(--yellow);font-size:13px}
  .expire-perm{color:var(--muted);font-size:13px}
  .hwid-count{color:var(--muted);font-size:13px}
  .actions{display:flex;gap:6px}
  .empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}

  /* ── MODAL ── */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;z-index:200;
    opacity:0;pointer-events:none;transition:.2s
  }
  .modal-bg.show{opacity:1;pointer-events:all}
  .modal{
    width:420px;background:var(--card);border:1.5px solid var(--purple);
    border-radius:18px;padding:28px;box-shadow:0 0 50px rgba(138,43,226,.3);
    transform:scale(.95);transition:.2s
  }
  .modal-bg.show .modal{transform:scale(1)}
  .modal h2{margin-bottom:20px;font-size:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field select{
    width:100%;padding:10px 12px;background:#0f0f18;border:1.5px solid var(--border);
    border-radius:8px;color:#fff;font-size:14px;outline:none;transition:.2s
  }
  .field input:focus,.field select:focus{border-color:var(--purple)}
  .field select option{background:#1a1a26}
  .field-hint{font-size:11px;color:var(--muted);margin-top:4px}
  .modal-btns{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
  .modal-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;
    font-size:14px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:999
  }
  #toast.show{opacity:1}
  #toast.ok{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
  #toast.err{background:rgba(255,68,85,.15);color:var(--red);border:1px solid rgba(255,68,85,.3)}

  /* ── RESPONSIVE ── */
  @media(max-width:600px){
    main{padding:16px}
    .stats{gap:10px}
    .toolbar{gap:8px}
  }
</style>
</head>
<body>

<!-- ╔══ LOGIN ══╗ -->
<div id="login-screen">
  <div class="login-box">
    <h1>LuluXStarDev</h1>
    <p style="font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:20px">Admin Panel</p>
    <input type="password" id="secret-input" placeholder="Admin secret..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-purple" style="width:85%;margin:0 auto;display:block" onclick="doLogin()">Login</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ╔══ APP ══╗ -->
<div id="app">
  <header>
    <div class="logo">LuluX<span>StarDev</span> <span style="font-size:13px;color:var(--muted);font-weight:400">Admin Panel</span></div>
    <div class="header-right">
      <span class="badge">Key System v2</span>
      <button class="btn btn-red btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Stats bar -->
    <div class="stats-bar">
      Total: <span id="st-total">0</span>
      <span class="sep">|</span>
      Active: <span id="st-active" style="color:var(--green)">0</span>
      <span class="sep">|</span>
      HWIDs: <span id="st-hwids" style="color:var(--blue)">0</span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search key, name, status..." oninput="renderTable()">
      </div>
      <button class="btn btn-purple" onclick="openAddModal()">Add Key</button>
      <button class="btn btn-blue btn-sm" onclick="loadKeys()">Refresh</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Key</th><th>Name</th><th>Status</th>
            <th>Expiry</th><th>HWID</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ╔══ ADD/EDIT MODAL ══╗ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Add Key</h2>

    <div class="field">
      <label>Owner Name *</label>
      <input type="text" id="m-name" placeholder="e.g. Lulu">
    </div>
    <div class="field">
      <label>Status</label>
      <select id="m-status">
        <option value="user">User</option>
        <option value="Developer">Developer</option>
        <option value="timDeveloper">Tim Developer</option>
      </select>
    </div>
    <div class="field">
      <label>Max HWID</label>
      <input type="number" id="m-hwid" value="1" min="1" max="999">
    </div>
    <div class="field">
      <label>Expired In</label>
      <input type="text" id="m-expire" placeholder="e.g. 7D · 1M · 12H · 0 = Permanent">
      
    </div>
    <div class="field" id="reset-field" style="display:none">
      <label><input type="checkbox" id="m-reset"> Reset HWID list</label>
    </div>
    <div class="modal-err" id="modal-err"></div>
    <div class="modal-btns">
      <button class="btn btn-red" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" id="modal-save-btn" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- ╔══ TOAST ══╗ -->
<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────
const API = ""; // empty = same origin
let ADMIN_SECRET = "";
let allKeys = [];
let editingKey = null;

// ── Auth ──────────────────────────────────────────────────────
function doLogin() {
  const val = document.getElementById("secret-input").value.trim();
  if (!val) { document.getElementById("login-err").textContent = "Enter secret key."; return; }
  ADMIN_SECRET = val;
  loadKeys().then(ok => {
    if (ok) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "flex";
    } else {
      document.getElementById("login-err").textContent = "Wrong secret or server error.";
      ADMIN_SECRET = "";
    }
  });
}
function doLogout() {
  ADMIN_SECRET = "";
  allKeys = [];
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("secret-input").value = "";
  document.getElementById("login-err").textContent = "";
}

// ── API helpers ───────────────────────────────────────────────
async function apiFetch(method, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json", "x-admin-secret": ADMIN_SECRET }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + "/api/admin", opts);
  return r.json();
}

// ── Load ──────────────────────────────────────────────────────
async function loadKeys() {
  try {
    const data = await apiFetch("GET");
    if (data.error) return false;
    allKeys = data;
    renderTable();
    updateStats();
    return true;
  } catch { return false; }
}

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  const now = Math.floor(Date.now() / 1000);
  let active = 0, hwids = 0;
  allKeys.forEach(k => {
    if (!k.expireAt || k.expireAt === 0 || k.expireAt > now) active++;
    hwids += (k.hwids || []).length;
  });
  document.getElementById("st-total").textContent = allKeys.length;
  document.getElementById("st-active").textContent = active;
  document.getElementById("st-hwids").textContent = hwids;
}

// ── Table render ──────────────────────────────────────────────
function renderTable() {
  const q = document.getElementById("search").value.toLowerCase();
  const tbody = document.getElementById("tbl-body");
  const now = Math.floor(Date.now() / 1000);
  const rows = allKeys.filter(k =>
    !q ||
    k.key.toLowerCase().includes(q) ||
    k.name.toLowerCase().includes(q) ||
    k.status.toLowerCase().includes(q)
  );

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty">No keys found</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(k => {
    const isPerm = !k.expireAt || k.expireAt === 0;
    const isExp  = !isPerm && k.expireAt < now;
    const rem    = isPerm ? null : k.expireAt - now;

    let expClass = "expire-perm", expLabel = "Permanent";
    if (!isPerm) {
      if (isExp) { expClass = "expire-warn"; expLabel = "Expired"; }
      else if (rem < 86400) { expClass = "expire-warn"; expLabel = k.expireLabel || "< 1D"; }
      else { expClass = "expire-ok"; expLabel = k.expireLabel || "Active"; }
    }

    const sClass = k.status === "Developer" ? "s-developer"
                 : k.status === "timDeveloper" ? "s-timDeveloper" : "s-user";

    return `<tr>
      <td><span class="key-val">${k.key}</span></td>
      <td>${k.name}</td>
      <td><span class="status-badge ${sClass}">${k.status}</span></td>
      <td><span class="${expClass}">${expLabel}</span></td>
      <td><span class="hwid-count">${(k.hwids||[]).length} / ${k.maxHwid}</span></td>
      <td>
        <div class="actions">
          <button class="btn btn-green btn-sm" onclick="copyTableKey('${k.key}')">Copy</button>
          <button class="btn btn-blue btn-sm" onclick='openEditModal(${JSON.stringify(k)})'>Edit</button>
          <button class="btn btn-red btn-sm" onclick="deleteKey('${k.key}', '${k.name}')">Del</button>
        </div>
      </td>
    </tr>`;
  }).join("");
}

// ── Modal ─────────────────────────────────────────────────────
function openAddModal() {
  editingKey = null;
  document.getElementById("modal-title").textContent = "Add Key";
  document.getElementById("m-name").value = "";
  document.getElementById("m-status").value = "user";
  document.getElementById("m-hwid").value = "1";
  document.getElementById("m-expire").value = "";
  document.getElementById("m-reset-field") && (document.getElementById("reset-field").style.display = "none");
  document.getElementById("modal-err").textContent = "";
  document.getElementById("modal-bg").classList.add("show");
}

function openEditModal(k) {
  editingKey = k.key;
  document.getElementById("modal-title").textContent = "Edit Key";
  document.getElementById("m-name").value = k.name;
  document.getElementById("m-status").value = k.status;
  document.getElementById("m-hwid").value = k.maxHwid;
  document.getElementById("m-expire").value = "";
  document.getElementById("reset-field").style.display = "block";
  document.getElementById("m-reset").checked = false;
  document.getElementById("modal-err").textContent = "";
  document.getElementById("modal-bg").classList.add("show");
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("show");
}

async function saveModal() {
  const name    = document.getElementById("m-name").value.trim();
  const key     = editingKey || "";
  const status  = document.getElementById("m-status").value;
  const maxHwid = parseInt(document.getElementById("m-hwid").value) || 1;
  const expireIn= document.getElementById("m-expire").value.trim();
  const errEl   = document.getElementById("modal-err");

  if (!name) { errEl.textContent = "Name is required"; return; }

  let data, ok;
  if (!editingKey) {
    // ADD - auto-generate key from name
    const autoKey = generateKey(name);
    data = await apiFetch("POST", { key: autoKey, name, status, maxHwid, expireIn });
  } else {
    // EDIT
    const payload = { key, name, status, maxHwid };
    if (expireIn) payload.expireIn = expireIn;
    if (document.getElementById("m-reset").checked) payload.resetHwids = true;
    data = await apiFetch("PUT", payload);
  }

  if (data.error) { errEl.textContent = data.error; return; }
  toast(editingKey ? "Key updated." : "Key added.", "ok");
  closeModal();
  loadKeys();
}

async function deleteKey(key, name) {
  if (!confirm(`Delete key for "${name}"?\n${key}\n\nThis cannot be undone.`)) return;
  const data = await apiFetch("DELETE", { key });
  if (data.error) { toast(data.error, "err"); return; }
  toast("Key deleted.", "ok");
  loadKeys();
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 3000);
}

// ── Copy key from table ───────────────────────────────────────
function copyTableKey(key) {
  navigator.clipboard.writeText(key).then(() => toast("Key copied.", "ok"));
}

// ── Key generation ───────────────────────────────────────────
function generateKey(name) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const rand = (n) => Array.from({length: n}, () =>
    chars[Math.floor(Math.random() * chars.length)]).join('');
  const now = new Date();
  const dd = String(now.getDate()).padStart(2, '0');
  const yy = String(now.getFullYear()).slice(-2);
  const hh = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  const mo = String(now.getMonth()+1).padStart(2,'0');
  // Admin: LULUX-NAME-XXXX-HHMM-MMDDYY
  const namePart = name
    ? name.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,8)
    : rand(4);
  return `LULUX-${namePart}-${rand(4)}-${hh}${mi}-${mo}${dd}${yy}`;
}

function genKey() {
  const name = document.getElementById('m-name').value.trim();
  document.getElementById('m-key').value = generateKey(name);
}

function copyKey() {
  const val = document.getElementById('m-key').value.trim();
  if (!val) { toast('Generate a key first.', 'err'); return; }
  navigator.clipboard.writeText(val).then(() => toast('Key copied.', 'ok'));
}

// ── Close modal on bg click ───────────────────────────────────
document.getElementById("modal-bg").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Secret input enter key ────────────────────────────────────
document.getElementById("secret-input").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
