<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuluXStarDev — Get Key</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#07070f;--surface:#0f0f1a;--card:#13131f;--border:#2a1f4a;
    --purple:#7c3aed;--purple2:#a855f7;--purple3:#1e1035;
    --text:#e2e0f0;--muted:#6b6890;--green:#22d47a;--red:#f43f5e;--yellow:#f59e0b;
  }
  body{background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;font-family:'Courier New',monospace}

  .panel{
    width:520px;max-width:100%;background:var(--card);
    border:1.5px solid var(--border);border-radius:20px;padding:32px;
    box-shadow:0 0 60px rgba(124,58,237,.2)
  }

  /* Header */
  .header{text-align:center;margin-bottom:28px}
  .header-title{font-size:22px;font-weight:700;letter-spacing:1px}
  .header-desc{font-size:12px;color:var(--muted);margin-top:6px}

  /* Progress + Button row */
  .verify-row{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .progress-wrap{flex:3}
  .progress-meta{display:flex;justify-content:space-between;
    margin-bottom:8px;font-size:11px;text-transform:uppercase;letter-spacing:2px}
  .progress-label{color:var(--muted)}
  .progress-val{transition:.3s}
  .progress-bar{height:6px;background:#1a1a2e;border-radius:999;overflow:hidden}
  .progress-fill{height:100%;width:0%;
    background:linear-gradient(90deg,var(--purple),var(--purple2));
    border-radius:999;transition:width .4s ease}

  /* Verify button (1/4) */
  .btn-verify{
    flex:1;padding:0;height:42px;border:none;border-radius:10px;
    background:var(--purple);color:#fff;font-size:10px;font-weight:700;
    cursor:pointer;letter-spacing:1px;text-transform:uppercase;
    transition:all .2s;font-family:'Courier New',monospace;white-space:nowrap
  }
  .btn-verify:hover:not(:disabled){background:var(--purple2)}
  .btn-verify:disabled{background:var(--purple3);color:var(--muted);cursor:default}
  .btn-verify.dim{background:var(--purple3);color:var(--muted);cursor:default}

  /* Key list */
  .keys-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:12px;font-size:11px;text-transform:uppercase;letter-spacing:2px;
    color:var(--muted)
  }
  .key-list{display:flex;flex-direction:column;gap:8px}
  .key-row{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:12px 14px;
    display:flex;align-items:center;gap:8px
  }
  .key-val{
    flex:1;font-size:12px;color:var(--purple2);letter-spacing:.5px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap
  }
  .dur-badge{
    padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap
  }
  .dur-ok{background:rgba(34,212,122,.1);color:var(--green);border:1px solid rgba(34,212,122,.25)}
  .dur-max{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
  .btn-sm{
    padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);
    font-family:'Courier New',monospace;transition:all .2s
  }
  .btn-copy{background:rgba(124,58,237,.1);color:var(--purple2)}
  .btn-copy:hover{background:rgba(124,58,237,.2)}
  .btn-copy.ok{background:rgba(34,212,122,.1);color:var(--green);border-color:rgba(34,212,122,.3)}
  .btn-expand{background:rgba(124,58,237,.1);color:var(--purple2)}
  .btn-expand:hover:not(:disabled){background:rgba(124,58,237,.2)}
  .btn-expand:disabled{background:transparent;color:var(--muted);cursor:default}

  /* Toast */
  #toast{
    position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:10px;
    font-size:13px;font-weight:700;opacity:0;pointer-events:none;
    transition:opacity .3s;z-index:999;font-family:'Courier New',monospace
  }
  #toast.show{opacity:1}
  #toast.ok{background:rgba(34,212,122,.12);color:var(--green);border:1px solid rgba(34,212,122,.3)}
  #toast.err{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.3)}
</style>
</head>
<body>

<div class="panel">
  <!-- Header -->
  <div class="header">
    <div class="header-title">LuluXStarDev</div>
    <div class="header-desc">Redeem your key — you redem and we earn .</div>
  </div>

  <!-- Progress + Verify button (same row) -->
  <div class="verify-row">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">Verification</span>
        <span class="progress-val" id="prog-val">0 / 1</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>
    <button class="btn-verify" id="main-btn" onclick="handleMain()">Verify</button>
  </div>

  <!-- Key list -->
  <div id="keys-section" style="display:none">
    <div class="keys-header">Your Keys</div>
    <div class="key-list" id="key-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = "";
const COOLDOWN_MS = 2 * 60 * 1000;

let sessionToken = null;
let pendingAction = null;
let pendingExpandKey = null;
let keys = JSON.parse(localStorage.getItem("lulux_keys") || "[]");

let toastTimer;
function toast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 3000);
}

function getCooldownLeft() {
  const last = parseInt(localStorage.getItem("lulux_cd") || "0");
  const left = last + COOLDOWN_MS - Date.now();
  return left > 0 ? left : 0;
}
function setCooldown() { localStorage.setItem("lulux_cd", Date.now().toString()); }

function setProgress(v) {
  document.getElementById("prog-fill").style.width = (v * 100) + "%";
  document.getElementById("prog-val").textContent = `${v} / 1`;
  document.getElementById("prog-val").style.color = v === 1 ? "var(--green)" : "var(--muted)";
}

function setBtn(text, disabled = false, dim = false) {
  const btn = document.getElementById("main-btn");
  btn.textContent = text;
  btn.disabled = disabled;
  btn.className = "btn-verify" + (dim ? " dim" : "");
}

function renderKeys() {
  const list = document.getElementById("key-list");
  const section = document.getElementById("keys-section");
  const now = Math.floor(Date.now() / 1000);
  keys = keys.filter(k => !k.expireAt || k.expireAt === 0 || k.expireAt > now);
  localStorage.setItem("lulux_keys", JSON.stringify(keys));
  if (keys.length === 0) { section.style.display = "none"; return; }
  section.style.display = "block";

  list.innerHTML = keys.map(k => {
    const isPerm = !k.expireAt || k.expireAt === 0;
    const remSecs = isPerm ? Infinity : k.expireAt - now;
    const remH = isPerm ? Infinity : Math.floor(remSecs / 3600);
    const isMax = remH >= 48;
    const durLabel = isPerm ? "Permanent"
      : remH >= 24 ? `${Math.floor(remH/24)}D ${remH%24}H` : `${remH}H`;

    return `<div class="key-row">
      <div class="key-val" title="${k.key}">${k.key}</div>
      <span class="dur-badge ${isMax ? 'dur-max' : 'dur-ok'}">${durLabel}</span>
      <button class="btn-sm btn-copy" id="cp-${k.key}" onclick="copyKey('${k.key}')">Copy</button>
      <button class="btn-sm btn-expand" ${isMax?'disabled':''} onclick="startExpand('${k.key}')">
        ${isMax ? "Max" : "+12H"}
      </button>
    </div>`;
  }).join("");
}

function copyKey(key) {
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById(`cp-${key}`);
    if (btn) { btn.textContent = "Copied"; btn.classList.add("ok"); }
    setTimeout(() => {
      const b = document.getElementById(`cp-${key}`);
      if (b) { b.textContent = "Copy"; b.classList.remove("ok"); }
    }, 1500);
  });
}

function handleMain() {
  if (sessionToken) {
    if (pendingAction === "expand" && pendingExpandKey) doExpand();
    else doGenerate();
  } else {
    if (keys.length >= 5) { toast("Key limit reached (5/5).", "err"); return; }
    startVerify(pendingAction || "generate");
  }
}

function startExpand(key) {
  const cd = getCooldownLeft();
  if (cd > 0) { toast(`Wait ${Math.ceil(cd/1000)}s.`, "err"); return; }
  pendingAction = "expand";
  pendingExpandKey = key;
  sessionToken = null;
  setProgress(0);
  setBtn("Verify");
  toast("Verify to expand this key.");
}

async function startVerify(action) {
  const cd = getCooldownLeft();
  if (cd > 0) { toast(`Wait ${Math.ceil(cd/1000)}s.`, "err"); return; }
  pendingAction = action || "generate";
  setBtn("...", true);
  try {
    const r = await fetch(API + "/api/claimkey", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "getlink" })
    });
    const data = await r.json();
    if (data.url) {
      localStorage.setItem("lulux_pending", pendingAction);
      localStorage.setItem("lulux_expand_key", pendingExpandKey || "");
      window.location.href = data.url;
    } else {
      toast("Failed to get link.", "err");
      setBtn("Verify");
    }
  } catch {
    toast("Network error.", "err");
    setBtn("Verify");
  }
}

async function verifyHash(hash) {
  setBtn("...", true);
  try {
    const r = await fetch(API + "/api/claimkey", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "verify", hash })
    });
    const data = await r.json();
    if (data.valid) {
      sessionToken = data.token;
      setProgress(1);
      const pa = localStorage.getItem("lulux_pending") || "generate";
      pendingAction = pa;
      pendingExpandKey = localStorage.getItem("lulux_expand_key") || null;
      localStorage.removeItem("lulux_pending");
      localStorage.removeItem("lulux_expand_key");
      window.history.replaceState({}, "", "/getkey");
      setBtn(pa === "expand" ? "Expand" : "Generate");
    } else {
      toast(data.message || "Verification failed.", "err");
      setBtn("Verify");
    }
  } catch {
    toast("Verification error.", "err");
    setBtn("Verify");
  }
}

async function doGenerate() {
  if (!sessionToken) return;
  if (keys.length >= 5) { toast("Key limit reached (5/5).", "err"); return; }
  setBtn("...", true);
  try {
    const r = await fetch(API + "/api/claimkey", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "generate", token: sessionToken })
    });
    const data = await r.json();
    if (data.success) {
      keys.push({ key: data.key, expireAt: data.expireAt });
      localStorage.setItem("lulux_keys", JSON.stringify(keys));
      setCooldown();
      sessionToken = null;
      setProgress(0);
      renderKeys();
      toast("Key generated.");
      setBtn("Verify");
    } else {
      toast(data.message || "Failed.", "err");
      setBtn("Verify");
      sessionToken = null; setProgress(0);
    }
  } catch {
    toast("Network error.", "err");
    setBtn("Verify");
  }
}

async function doExpand() {
  if (!sessionToken || !pendingExpandKey) return;
  setBtn("...", true);
  try {
    const r = await fetch(API + "/api/claimkey", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "expand", token: sessionToken, key: pendingExpandKey })
    });
    const data = await r.json();
    if (data.success) {
      const idx = keys.findIndex(k => k.key === pendingExpandKey);
      if (idx !== -1) keys[idx].expireAt = data.expireAt;
      localStorage.setItem("lulux_keys", JSON.stringify(keys));
      setCooldown();
      sessionToken = null; pendingExpandKey = null;
      setProgress(0);
      renderKeys();
      toast("Key expanded +12H.");
      setBtn("Verify");
    } else {
      toast(data.message || "Failed.", "err");
      setBtn("Verify");
      sessionToken = null; setProgress(0);
    }
  } catch {
    toast("Network error.", "err");
    setBtn("Verify");
  }
}

async function validateStoredKeys() {
  if (keys.length === 0) return;
  try {
    const r = await fetch(API + "/api/claimkey", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "checkkeys", keys: keys.map(k => k.key) })
    });
    const data = await r.json();
    const validKeys = data.valid || [];
    // Keep only keys that server confirms valid, update expireAt
    keys = keys
      .map(k => {
        const sv = validKeys.find(v => v.key === k.key);
        return sv ? { ...k, expireAt: sv.expireAt } : null;
      })
      .filter(Boolean);
    localStorage.setItem("lulux_keys", JSON.stringify(keys));
    renderKeys();
  } catch {
    // Network error - keep keys as-is, will fail at verify anyway
  }
}

(function init() {
  const params = new URLSearchParams(window.location.search);
  const hash = params.get("hash");
  renderKeys();
  if (hash) {
    verifyHash(hash);
  } else {
    // Validate stored keys against server on load
    validateStoredKeys();
    const cdLeft = getCooldownLeft();
    if (cdLeft > 0) {
      setBtn(`${Math.ceil(cdLeft/1000)}s`, true, true);
      const t = setInterval(() => {
        const left = getCooldownLeft();
        if (left <= 0) { clearInterval(t); setBtn("Verify"); return; }
        setBtn(`${Math.ceil(left/1000)}s`, true, true);
      }, 1000);
    } else {
      setBtn("Verify");
    }
  }
})();
</script>
</body>
</html>
